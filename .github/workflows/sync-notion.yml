name: Sync from Notion

on:
  workflow_dispatch:        # 手動按鈕觸發
  schedule:
    - cron: "0 * * * *"     # 每小時自動同步一次（UTC）

permissions:
  contents: write

concurrency:
  group: sync-notion
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch content from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node scripts/fetch-notion.mjs

      - name: Commit changes if any
        run: |
          git config user.name "notion-sync[bot]"
          git config user.email "notion-sync@users.noreply.github.com"
          git add data images
          if git diff --staged --quiet; then
            echo "沒有內容變更，跳過。"
          else
            git commit -m "Sync content from Notion"
            git push
          fi
